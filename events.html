<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — The Shin Dig</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Barlow',sans-serif;overflow-x:hidden;width:100%;}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:64px;
  background:rgba(10,10,10,0.97);border-bottom:1px solid rgba(255,255,255,0.07);
}
.nav-logo{height:52px;width:auto;}
.nav-links{display:flex;gap:28px;list-style:none;}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);text-decoration:none;transition:color 0.15s;}
.nav-links a:hover,.nav-links a.active{color:#fff;}

.page-wrap{max-width:1100px;margin:0 auto;padding:100px 32px 80px;}
.page-title{font-family:'Oswald',sans-serif;font-size:42px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:#fff;margin-bottom:8px;}
.page-subtitle{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#ff0000;margin-bottom:48px;}

/* LAYOUT */
.events-layout{display:grid;grid-template-columns:1fr 340px;gap:32px;align-items:start;}

/* ── CALENDAR ── */
.calendar{background:#111;padding:24px;}

.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.cal-month{
  font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.06em;color:#fff;
}
.cal-btn{
  background:none;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);
  width:32px;height:32px;cursor:pointer;font-size:14px;
  transition:border-color 0.2s,color 0.2s;display:flex;align-items:center;justify-content:center;
}
.cal-btn:hover{border-color:#ff0000;color:#ff0000;}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-label{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.2);
  text-align:center;padding:6px 0 10px;
}
.cal-day{
  aspect-ratio:1;position:relative;cursor:default;
  background:#0f0f0f;transition:background 0.15s;
}
.cal-day.other-month .cal-day-num{color:rgba(255,255,255,0.12);}
.cal-day.has-event{cursor:pointer;}
.cal-day.has-event:hover{background:#161616;}
.cal-day.selected{background:#1a1a1a;outline:1px solid rgba(255,0,0,0.4);}
.cal-day.hovered{background:#1a1a1a;outline:1px solid rgba(255,255,255,0.15);}
.cal-day-num{
  position:absolute;top:5px;left:0;right:0;text-align:center;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;
  color:rgba(255,255,255,0.5);line-height:1;
}
.cal-day.has-event .cal-day-num{color:#fff;}
.cal-day.today .cal-day-num{
  background:#ff0000;color:#fff;border-radius:50%;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  left:50%;right:auto;transform:translateX(-50%);top:4px;
}
/* Tablets — absolutely positioned so same slot = same Y across all cells */
.cal-tablet{
  position:absolute;height:6px;
}
.cal-tablet.single{left:10%;right:10%;border-radius:3px;}
.cal-tablet.start{left:10%;right:-2px;border-radius:3px 0 0 3px;}
.cal-tablet.middle{left:-2px;right:-2px;}
.cal-tablet.end{left:-2px;right:10%;border-radius:0 3px 3px 0;}

.cal-tablet.hosting{background:rgba(255,0,0,0.75);}
.cal-tablet.attending{background:rgba(74,158,255,0.65);}
.cal-tablet.livestream{background:rgba(180,95,229,0.7);}
.cal-dot.hosting{background:#ff0000;}
.cal-dot.attending{background:#4a9eff;}
.cal-dot.livestream{background:#b45fe5;}

/* LEGEND */
.cal-legend{
  display:flex;gap:20px;margin-top:16px;padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;
}
.legend-item{display:flex;align-items:center;gap:6px;}
.legend-dot{width:28px;height:10px;border-radius:2px;flex-shrink:0;}
.legend-label{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.3);
}

/* ── UPCOMING LIST ── */
.upcoming{display:flex;flex-direction:column;gap:2px;}
.upcoming-header{
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:0.14em;text-transform:uppercase;color:#fff;
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;
}
.upcoming-header::before{content:'';display:block;width:3px;height:13px;background:#ff0000;}

.event-card{
  background:#111;padding:16px 18px;
  border-left:3px solid transparent;
  transition:background 0.2s, border-color 0.2s;
  text-decoration:none;color:inherit;display:block;
  cursor:pointer;
}
.event-card.hosting{border-left-color:#ff0000;}
.event-card.attending{border-left-color:#4a9eff;}
.event-card.livestream{border-left-color:#b45fe5;}
.event-card.selected-card{background:#161616;outline:1px solid rgba(255,255,255,0.08);}

.ev-date{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);
  margin-bottom:4px;display:block;
}
.ev-title{
  font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.04em;color:#fff;
  display:block;margin-bottom:3px;transition:color 0.2s;
}
.event-card:hover .ev-title{color:#ff0000;}
.ev-meta{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.25);
  display:flex;gap:12px;align-items:center;margin-top:6px;flex-wrap:wrap;
}
.ev-type{
  padding:2px 7px;font-size:10px;letter-spacing:0.1em;
}
.ev-type.hosting{background:rgba(255,0,0,0.15);color:#ff0000;}
.ev-type.attending{background:rgba(74,158,255,0.15);color:#4a9eff;}
.ev-type.livestream{background:rgba(180,95,229,0.15);color:#b45fe5;}

.no-events{
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.2);
  padding:24px 18px;background:#111;text-align:center;
}

/* FOOTER */
.site-footer{padding:40px 32px 48px;border-top:1px solid rgba(255,255,255,0.07);text-align:center;}
.footer-socials{display:flex;justify-content:center;gap:24px;margin-bottom:16px;}
.footer-socials a{display:block;width:22px;height:22px;color:rgba(255,255,255,0.3);transition:color 0.2s;}
.footer-socials a:hover{color:#ff0000;}
.footer-socials svg{width:22px;height:22px;}
.footer-copy{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.15);}

@media(max-width:900px){
  .events-layout{grid-template-columns:1fr;}
}
@media(max-width:600px){
  nav{padding:0 16px;height:48px;}
  .nav-logo{height:26px;}
  .nav-links{gap:16px;}
  .nav-links a{font-size:11px;letter-spacing:0.08em;}
  .page-wrap{padding:80px 16px 60px;}
  .page-title{font-size:32px;}
  .calendar{padding:16px;}
  .cal-day-num{font-size:11px;}
}
</style>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MANUAL EVENTS — add/edit here
// type: 'hosting' | 'attending' | 'livestream'
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MANUAL_EVENTS = [];
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GOOGLE CALENDAR — paste your public
// Calendar ID below when ready
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const GCAL_ID = '5cad6d407f3cf54943fec2817c1af011d21e3d0e5b6e89daeed885e194a03549@group.calendar.google.com';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const YT_KEY = 'AIzaSyApQveLGZ_wU1Z2kAvdKXAF7n4oCo3y4Vs'; // used for Google Calendar API only

// Merged event list — populated async
let EVENTS = [...MANUAL_EVENTS];


async function fetchGoogleCalendar() {
  if (!GCAL_ID) return;
  try {
    const now = new Date().toISOString();
    const end = new Date(Date.now() + 365*24*60*60*1000).toISOString();
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_ID)}/events?key=${YT_KEY}&timeMin=${now}&timeMax=${end}&singleEvents=true&orderBy=startTime&maxResults=50`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.items) return;
    for (const item of data.items) {
      const start = item.start?.dateTime || item.start?.date;
      if (!start) continue;
      const dateStr = start.slice(0, 10);

      // End date — all-day events have exclusive end, so subtract 1 day
      let endDateStr = dateStr;
      const rawEnd = item.end?.dateTime || item.end?.date;
      if (rawEnd) {
        if (item.end.date) {
          // All-day: end is exclusive, step back one day
          const endD = new Date(rawEnd + 'T00:00:00');
          endD.setDate(endD.getDate() - 1);
          endDateStr = endD.toISOString().slice(0, 10);
        } else {
          endDateStr = rawEnd.slice(0, 10);
        }
      }

      const desc = (item.description || '').toLowerCase();
      const type = desc.includes('hosting') ? 'hosting' : desc.includes('livestream') || desc.includes('live stream') ? 'livestream' : 'attending';
      EVENTS.push({
        date: dateStr,
        endDate: endDateStr,
        title: item.summary || 'Event',
        location: item.location || '',
        type: type,
        url: item.htmlLink || ''
      });
    }
  } catch(e) {
    console.error('Google Calendar fetch failed:', e);
  }
}


// Assign each event a fixed vertical lane (slot) so bars stay aligned across cells
function assignSlots() {
  const sorted = [...EVENTS].sort((a, b) => a.date.localeCompare(b.date));
  for (const evt of sorted) {
    const evtEnd = evt.endDate || evt.date;
    const takenSlots = new Set();
    for (const other of EVENTS) {
      if (other === evt || other.slot === undefined) continue;
      const otherEnd = other.endDate || other.date;
      if (other.date <= evtEnd && otherEnd >= evt.date) {
        takenSlots.add(other.slot);
      }
    }
    let slot = 0;
    while (takenSlots.has(slot)) slot++;
    evt.slot = slot;
  }
}

const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let current = new Date();
current.setDate(1);

function isoDate(d){ return d.toISOString().slice(0,10); }

function eventsOnDate(dateStr){
  return EVENTS.filter(e => e.date <= dateStr && (e.endDate || e.date) >= dateStr);
}

function futureEvents(){
  const today = isoDate(new Date());
  return EVENTS.filter(e => e.date >= today).sort((a,b) => a.date.localeCompare(b.date));
}

function formatDate(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
}

function renderCalendar(){
  const grid = document.getElementById('cal-grid');
  const label = document.getElementById('cal-month-label');
  grid.innerHTML = '';
  label.textContent = MONTHS[current.getMonth()] + ' ' + current.getFullYear();

  // Day labels — start Monday
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const year = current.getFullYear();
  const month = current.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month + 1, 0);
  const today    = isoDate(new Date());

  // Monday=0 offset
  let startOffset = (firstDay.getDay() + 6) % 7;

  // Previous month padding
  for(let i = startOffset - 1; i >= 0; i--){
    const d = new Date(year, month, -i);
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.innerHTML = `<span class="cal-day-num">${d.getDate()}</span>`;
    grid.appendChild(el);
  }

  // Current month days
  for(let day = 1; day <= lastDay.getDate(); day++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const evs = eventsOnDate(dateStr);
    const el = document.createElement('div');
    el.className = 'cal-day' + (evs.length ? ' has-event' : '') + (dateStr === today ? ' today' : '');
    el.dataset.date = dateStr;
    el.innerHTML = `<span class="cal-day-num">${day}</span>`;
    if(evs.length){
      evs.slice(0,3).forEach(e => {
        const isStart = e.date === dateStr;
        const isEnd   = (e.endDate || e.date) === dateStr;
        const pos     = isStart && isEnd ? 'single' : isStart ? 'start' : isEnd ? 'end' : 'middle';
        const slot    = e.slot || 0;
        const t = document.createElement('span');
        t.className = `cal-tablet ${e.type} ${pos}`;
        t.style.bottom = (4 + slot * 10) + 'px';
        el.appendChild(t);
      });
      el.addEventListener('click', () => highlightEvents(dateStr, el));
    }
    grid.appendChild(el);
  }

  // Next month padding to complete grid
  const totalCells = startOffset + lastDay.getDate();
  const remainder = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for(let i = 1; i <= remainder; i++){
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.innerHTML = `<span class="cal-day-num">${i}</span>`;
    grid.appendChild(el);
  }
}

function highlightEvents(dateStr, calDayEl){
  document.querySelectorAll('.cal-day.selected').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.event-card.selected-card').forEach(el => el.classList.remove('selected-card'));
  calDayEl.classList.add('selected');
  const card = document.querySelector(`.event-card[data-date="${dateStr}"]`);
  if(card){
    card.classList.add('selected-card');
    card.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

function renderUpcoming(){
  const list = document.getElementById('upcoming-list');
  const evs = futureEvents();
  list.innerHTML = '';
  if(!evs.length){
    list.innerHTML = '<div class="no-events">No upcoming events — check back soon</div>';
    return;
  }
  evs.forEach(e => {
    const el = document.createElement('div');
    el.className = `event-card ${e.type}`;
    el.dataset.date = e.date;
    el.innerHTML = `
      <span class="ev-date">${formatDate(e.date)}</span>
      <span class="ev-title">${e.title}</span>
      <div class="ev-meta">
        <span>${e.location}</span>
        <span class="ev-type ${e.type}">${e.type}</span>
      </div>`;
    el.addEventListener('mouseenter', () => {
      document.querySelectorAll('.cal-day.hovered').forEach(d => d.classList.remove('hovered'));
      const calDay = document.querySelector(`.cal-day[data-date="${e.date}"]`);
      if (calDay) calDay.classList.add('hovered');
    });
    el.addEventListener('mouseleave', () => {
      document.querySelectorAll('.cal-day.hovered').forEach(d => d.classList.remove('hovered'));
    });
    list.appendChild(el);
  });
}

document.getElementById('prev-btn').addEventListener('click', () => {
  current.setMonth(current.getMonth() - 1);
  renderCalendar();
});
document.getElementById('next-btn').addEventListener('click', () => {
  current.setMonth(current.getMonth() + 1);
  renderCalendar();
});

// Fetch live data then render
async function init() {
  await fetchGoogleCalendar();
  EVENTS.sort((a, b) => a.date.localeCompare(b.date));
  assignSlots();
  renderCalendar();
  renderUpcoming();
}

document.getElementById('prev-btn').removeEventListener('click', () => {});
document.getElementById('next-btn').removeEventListener('click', () => {});

init();
</script>
